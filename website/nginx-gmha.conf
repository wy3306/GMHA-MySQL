server {
    listen 80;
    server_name gmha.weiyaonas.club;

    root /var/www/gmha.weiyaonas.club;
    index index.html;

    access_log /var/log/nginx/gmha_access.log;
    error_log /var/log/nginx/gmha_error.log warn;

    charset utf-8;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'none'; font-src 'self'; form-action 'none'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|webmanifest|xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
